backend:
  name: git-gateway
  branch: main

media_folder: "static/img"
public_folder: "/img"

i18n:
  structure: multiple_folders
  locales: [en, tr]
  default_locale: en

collections:
  - name: "news"
    label: "News & Insights"
    folder: "content"
    path: "{{locale}}/news/{{slug}}"
    create: true
    i18n: true
    fields:
      - { label: "Title",    name: "title",    widget: "string",   i18n: true }
      - { label: "Date",     name: "date",     widget: "datetime", i18n: duplicate }
      - { label: "Category", name: "category", widget: "string",   i18n: true,      required: false }
      - { label: "Icon",     name: "icon",     widget: "string",   i18n: duplicate, default: "ti-file-text", hint: "Tabler icon name e.g. ti-cloud (used when no image is set)" }
      - { label: "Image",    name: "image",    widget: "image",    i18n: duplicate, required: false, hint: "Featured image for the card and post header. Overrides the icon." }
      - { label: "Summary",  name: "summary",  widget: "text",     i18n: true }
      - { label: "Draft",    name: "draft",    widget: "boolean",  i18n: duplicate, default: true }
      - { label: "Body",     name: "body",     widget: "markdown", i18n: true }
